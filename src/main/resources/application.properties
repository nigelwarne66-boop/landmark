spring.application.name=Landmark
# ── Fixed Assets — application.properties ───────────────────────────────────
# Uncomment the block matching your database. Only one block should be active.

# ── MySQL / MySQL-compatible (current dev environment) ───────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/lmextract?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Australia/Perth
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:another}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── MariaDB ───────────────────────────────────────────────────────────────────
#spring.datasource.url=jdbc:mariadb://localhost:3306/lmextract
#spring.datasource.username=${DB_USERNAME:root}
#spring.datasource.password=${DB_PASSWORD:}
#spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# ── SQL Server ────────────────────────────────────────────────────────────────
#spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=lmextract;encrypt=false
#spring.datasource.username=${DB_USERNAME:sa}
#spring.datasource.password=${DB_PASSWORD:}
#spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ── Connection pool ───────────────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=10000

# ── Spring ────────────────────────────────────────────────────────────────────
# servlet mode required — AssetRegisterViewerService runs an embedded Tomcat servlet
# on port 8090 to serve the interactive FA Register HTML report in the browser.
spring.main.web-application-type=servlet
spring.main.banner-mode=off

# ── Asset Register viewer port ────────────────────────────────────────────────
# The interactive FA Register opens at http://localhost:8090/fa/asset-register
server.port=8090

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.org.springframework.jdbc.core=INFO
logging.level.com.landmarksoftware.desktop=INFO

# ── OZEDI SuperStream / MVR ──────────────────────────────────────────────────
# Endpoints — usually static, override per environment if Ozedi moves them.
ozedi.b2b-host=api-ebusiness.ozedi.com.au
ozedi.ss2-host=api-superstream.ozedi.com.au
# Landmark-level account + SS2 client (constants for this app). Document the
# pattern that Landmark uses one eBusiness account and one SS2 client ID across
# customer sites.
ozedi.account-no=121457442888897
ozedi.client-id=8981020306
# Credentials — should be a dedicated API service account. Override per
# deployment via env vars OZEDI_USERNAME / OZEDI_PASSWORD; do NOT commit
# personal credentials to source.
ozedi.username=${OZEDI_USERNAME:}
ozedi.password=${OZEDI_PASSWORD:}
# Optional log directory for MVR debug log. Defaults to user-home/landmark-mvr.
ozedi.log-dir=${OZEDI_LOG_DIR:}
# Sender contact details (formerly read from papsdat) — set per deployment.
# Used in the "sender" block of the MVR JSON. Override with env vars
# OZEDI_SENDER_EMAIL / OZEDI_SENDER_CONTACT_NAME.
ozedi.sender-email=${OZEDI_SENDER_EMAIL:}
ozedi.sender-contact-name=${OZEDI_SENDER_CONTACT_NAME:}
